<style>
  :root{
    --ink:#0A0C14; --ink2:#0E1220;
    --beamA:#F8C25E; --beamB:#E7902B; --gold:#F6B24A;
    --indigoA:#8E9CFF; --indigoB:#5B6AD6;
    --text:#F4F6FC; --muted:#AEB6D0;
    --sys:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#333;padding:24px;font-family:var(--sys)}

  .banner{
    width:1280px;height:720px;position:relative;overflow:hidden;
    background:
      radial-gradient(760px 520px at 84% -8%, rgba(246,178,74,0.22), transparent 62%),
      radial-gradient(640px 640px at 10% 108%, rgba(124,140,255,0.12), transparent 60%),
      linear-gradient(155deg,#0C1120 0%,#0A0C14 55%,#0B0E1C 100%);
  }
  .beam{
    position:absolute;inset:0;pointer-events:none;
    background:conic-gradient(from 205deg at 82% -4%, transparent 0deg, rgba(246,178,74,0.16) 16deg, rgba(246,178,74,0.04) 30deg, transparent 46deg);
  }
  /* faint film-strip along the bottom */
  .strip{position:absolute;left:0;right:0;bottom:0;height:44px;
    background:repeating-linear-gradient(90deg,#0E1220 0 34px,transparent 34px 48px);
    opacity:.5;
    -webkit-mask:linear-gradient(180deg,transparent,#000 60%);mask:linear-gradient(180deg,transparent,#000 60%);}
  .strip::before,.strip::after{content:"";position:absolute;left:0;right:0;height:10px;
    background:repeating-linear-gradient(90deg,transparent 0 10px,#05070d 10px 20px);}
  .strip::before{top:4px}.strip::after{bottom:4px}

  /* decorative poster wall on the right */
  .posters{position:absolute;right:-40px;top:64px;width:560px;height:600px}
  .poster{position:absolute;width:190px;height:280px;border-radius:20px;
    box-shadow:0 30px 60px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.06);
    display:flex;align-items:center;justify-content:center;}
  .poster svg{opacity:.9}
  .p1{right:300px;top:150px;transform:rotate(-9deg);
    background:linear-gradient(160deg,#20284a,#141a2e)}
  .p2{right:150px;top:70px;transform:rotate(-3deg);
    background:linear-gradient(160deg,#2a2140,#171326)}
  .p3{right:8px;top:150px;transform:rotate(7deg);
    background:linear-gradient(160deg,#3a2a12,#1c1608)}
  .pmark{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--beamA),var(--beamB));opacity:.85}

  /* glass sheen over posters to blend into bg */
  .veil{position:absolute;right:0;top:0;width:620px;height:100%;
    background:linear-gradient(90deg,var(--ink) 0%, rgba(10,12,20,.55) 34%, transparent 70%)}

  /* content */
  .content{position:absolute;left:80px;top:0;height:100%;display:flex;flex-direction:column;justify-content:center;gap:0;z-index:3;max-width:720px}
  .lockup{display:flex;align-items:center;gap:24px;margin-bottom:30px}
  .mark{width:112px;height:112px;border-radius:30px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--beamA),var(--beamB));box-shadow:0 22px 60px rgba(246,178,74,.4)}
  .wm{font-weight:800;letter-spacing:.04em;line-height:1;font-size:96px}
  .wm .s{background:linear-gradient(135deg,var(--beamA),var(--beamB));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .wm .k{color:var(--text)}

  .tagline{font-size:34px;font-weight:600;color:var(--text);margin-bottom:8px}
  .tagline .hl{color:var(--gold)}
  .desc{font-size:20px;color:var(--muted);margin-bottom:34px;max-width:560px;line-height:1.5}

  .chips{display:flex;flex-wrap:wrap;gap:14px}
  .chip{display:flex;align-items:center;gap:9px;font-size:19px;color:var(--text);font-weight:600;
    padding:12px 20px;border-radius:999px;border:1px solid rgba(255,255,255,.10);
    background:rgba(255,255,255,.04);backdrop-filter:blur(4px)}
  .chip .dot{width:9px;height:9px;border-radius:3px}
</style>

<div class="banner" id="banner">
  <div class="beam"></div>

  <div class="posters" aria-hidden="true">
    <div class="poster p1"><div class="pmark"><svg width="30" height="30" viewBox="0 0 24 24"><path d="M8 5.4v13.2l11-6.6-11-6.6z" fill="#0A0C14"/></svg></div></div>
    <div class="poster p2"><div class="pmark"><svg width="30" height="30" viewBox="0 0 24 24"><path d="M8 5.4v13.2l11-6.6-11-6.6z" fill="#0A0C14"/></svg></div></div>
    <div class="poster p3"><div class="pmark"><svg width="30" height="30" viewBox="0 0 24 24"><path d="M8 5.4v13.2l11-6.6-11-6.6z" fill="#0A0C14"/></svg></div></div>
  </div>
  <div class="veil"></div>

  <div class="content">
    <div class="lockup">
      <div class="mark"><svg width="58" height="58" viewBox="0 0 24 24"><path d="M8 5.2v13.6l11-6.8-11-6.8z" fill="#0A0C14"/></svg></div>
      <div class="wm"><span class="s">SOF</span><span class="k">KINO</span></div>
    </div>
    <div class="tagline">Sifatli kinolar olami — <span class="hl">bir joyda.</span></div>
    <div class="desc">Janr tanlang, maxsus kod bilan oching yoki Premium bilan reklamasiz tomosha qiling.</div>
    <div class="chips">
      <span class="chip"><span class="dot" style="background:#F6B24A"></span>🎬 Janrlar</span>
      <span class="chip"><span class="dot" style="background:#7C8CFF"></span>🔑 Kod bilan ochish</span>
      <span class="chip"><span class="dot" style="background:#34D399"></span>💎 Premium</span>
      <span class="chip"><span class="dot" style="background:#60A5FA"></span>📰 Yangiliklar</span>
    </div>
  </div>

  <div class="strip"></div>
</div>
